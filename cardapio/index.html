<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MesaUp - Cardapio Digital</title>
<style>
  :root{
    --bg:#0f1117;--card:#1c2233;--border:#2a3350;--fg:#e8eaf0;--fg2:#a0a8c0;--muted:#5a6480;--primary:#f97316;--green:#22d3a0;--red:#f05252;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Segoe UI,system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
  .top{height:52px;background:#111827;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-weight:900}
  .top span{color:#fbbf24}
  .wrap{min-height:calc(100vh - 52px);display:flex;align-items:center;justify-content:center;padding:18px}
  .card{width:100%;max-width:520px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.28)}
  .icon{font-size:34px;margin-bottom:10px}.title{font-size:20px;font-weight:900;margin-bottom:6px}.sub{font-size:13px;color:var(--fg2);line-height:1.6;margin-bottom:16px}
  .code{display:inline-flex;background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.3);color:var(--primary);font:700 13px ui-monospace,monospace;border-radius:99px;padding:6px 12px;margin-bottom:14px;word-break:break-all}
  .btn{display:inline-flex;align-items:center;justify-content:center;min-height:40px;border:none;border-radius:9px;background:var(--primary);color:white;text-decoration:none;font-weight:800;padding:10px 16px;cursor:pointer}
  .danger{color:var(--red)}.ok{color:var(--green)}.muted{font-size:12px;color:var(--muted);line-height:1.6;margin-top:12px}
  iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:white;z-index:10}
</style>
</head>
<body>
<div class="top">Mesa<span>Up</span></div>
<div class="wrap">
  <div class="card" id="statusCard">
    <div class="icon">🍽️</div>
    <div class="title">Carregando cardapio...</div>
    <div class="sub">Aguarde um instante.</div>
  </div>
</div>
<script src="./config.js"></script>
<script>
function getCodigo(){
  const params = new URLSearchParams(location.search);
  const fromQuery = params.get('c') || params.get('codigo') || params.get('loja');
  if (fromQuery) return fromQuery;
  const parts = location.pathname.split('/').filter(Boolean);
  const idx = parts.indexOf('cardapio');
  return idx >= 0 ? (parts[idx + 1] || '') : '';
}
function cleanCodigo(v){
  return String(v || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9-]/g,'-').replace(/-+/g,'-').replace(/^-+|-+$/g,'').slice(0,64);
}
function setStatus({title, sub, icon='🍽️', code='', danger=false}){
  document.getElementById('statusCard').innerHTML = `
    <div class="icon">${icon}</div>
    <div class="title ${danger ? 'danger' : ''}">${title}</div>
    ${code ? `<div class="code">${code}</div>` : ''}
    <div class="sub">${sub}</div>
    <button class="btn" onclick="location.reload()">Tentar novamente</button>
    <div class="muted">MesaUp - Cardapio Digital</div>`;
}
(async function init(){
  const cfg = window.MESAUP_CARDAPIO_CONFIG || {};
  const storageBase = String(cfg.storageBase || '').replace(/\/$/, '');
  const codigo = cleanCodigo(getCodigo());
  if (!codigo) {
    setStatus({title:'Codigo nao informado', sub:'Abra o cardapio pelo QR Code do estabelecimento.', icon:'⚠️', danger:true});
    return;
  }
  if (!storageBase || storageBase.includes('__MESAUP_SUPABASE_PROJECT_REF__')) {
    setStatus({title:'Cardapio cloud em configuracao', sub:'O leitor publico ja esta instalado. Falta configurar o Supabase Storage no config.js.', icon:'⚙️', code:codigo});
    return;
  }
  const url = `${storageBase}/${encodeURIComponent(codigo)}/index.html?v=${Date.now()}`;
  try {
    const res = await fetch(url, { method:'HEAD', cache:'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
  } catch (err) {
    setStatus({title:'Cardapio ainda nao publicado', sub:'Peça ao estabelecimento para clicar em Publicar Nuvem no MesaUp.', icon:'📱', code:codigo});
    return;
  }
  const frame = document.createElement('iframe');
  frame.src = url;
  frame.title = 'Cardapio MesaUp';
  document.body.appendChild(frame);
})();
</script>
</body>
</html>
