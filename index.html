<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GHZ Plugin - HTML Venda</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #161b27; --card: #1c2233; --card2: #222840;
    --border: #2a3350; --border2: #3a4570;
    --primary: #4f8ef7; --primary2: #3a7af0;
    --primary-bg: rgba(79,142,247,.12); --primary-bdr: rgba(79,142,247,.3);
    --green: #22d3a0; --green-bg: rgba(34,211,160,.1);
    --red: #f05252;
    --fg: #e8eaf0; --fg2: #a0a8c0; --muted: #5a6480;
  }
  * { box-sizing: border-box; margin: 0; padding: 0 }
  body { font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; padding: 24px }
  .header { text-align: center; margin-bottom: 24px }
  .header h1 { font-size: 24px; font-weight: 900 }
  .header h1 span { color: var(--primary) }
  .header p { font-size: 13px; color: var(--muted); margin-top: 6px }
  .grid { display: grid; grid-template-columns: 340px 1fr; gap: 20px; max-width: 1120px; margin: 0 auto }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden }
  .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); font-weight: 800; font-size: 13px; display: flex; justify-content: space-between; align-items: center; gap: 10px }
  .card-body { padding: 18px }
  .status-ok { color: var(--green); font-size: 11px; font-weight: 700 }
  .status-bad { color: var(--red); font-size: 11px; font-weight: 700 }
  label { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; display: block; margin-bottom: 5px }
  input { width: 100%; background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 12px; color: var(--fg); font-size: 13px; outline: none; font-family: inherit; margin-bottom: 13px }
  input:focus { border-color: var(--primary) }
  .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px }
  .app-btn { padding: 10px 12px; border: 2px solid var(--border2); border-radius: 10px; background: transparent; cursor: pointer; font-family: inherit; transition: all .15s; text-align: left }
  .app-btn:hover { border-color: var(--primary-bdr); background: var(--primary-bg) }
  .app-btn.ativo { border-color: var(--primary); background: var(--primary-bg) }
  .app-btn .nome { font-size: 13px; font-weight: 700; color: var(--fg) }
  .app-btn .prefix { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: monospace }
  .app-btn .badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 4px; margin-left: 6px; font-weight: 700 }
  .app-btn .badge-online { background: rgba(34,211,160,.15); color: var(--green) }
  .app-btn .badge-local { background: rgba(90,100,128,.2); color: var(--muted) }
  .btn { width: 100%; padding: 12px; border: none; border-radius: 9px; cursor: pointer; font-size: 14px; font-weight: 800; font-family: inherit; transition: all .15s }
  .btn-primary { background: var(--primary); color: #fff }
  .btn-primary:hover { background: var(--primary2) }
  .btn-primary:disabled { background: var(--border2); cursor: wait }
  .btn-copy { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,211,160,.25); padding: 7px 14px; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 700; font-family: inherit; white-space: nowrap }
  .btn-copy:hover { background: var(--green); color: #000 }
  .chave-box { background: var(--bg2); border: 2px solid var(--primary-bdr); border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; text-align: center }
  .chave-valor { font-family: monospace; font-size: 22px; font-weight: 900; color: var(--primary); letter-spacing: 2px; word-break: break-all }
  .chave-label { font-size: 10px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .06em }
  .msg-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: 10px; padding: 14px 16px; margin-bottom: 8px }
  .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px }
  .msg-titulo { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .07em }
  .msg-texto { font-size: 13px; color: var(--fg2); line-height: 1.8; white-space: pre-wrap; word-break: break-word }
  .tab-row { display: flex; gap: 6px; margin-bottom: 14px }
  .tab { padding: 7px 14px; border: 1px solid var(--border2); border-radius: 8px; background: transparent; color: var(--fg2); cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; transition: all .15s }
  .tab.ativo { background: var(--primary-bg); border-color: var(--primary-bdr); color: var(--primary) }
  .historico-item { padding: 10px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; gap: 10px }
  .historico-item .info { flex: 1; min-width: 0 }
  .historico-item .app-nome { font-size: 12px; font-weight: 700; color: var(--fg) }
  .historico-item .chave-mini { font-family: monospace; font-size: 12px; color: var(--primary); margin-top: 2px }
  .historico-item .data { font-size: 10px; color: var(--muted) }
  .historico-item .acoes { display: flex; gap: 5px; flex-shrink: 0 }
  .empty { text-align: center; color: var(--muted); padding: 24px; font-size: 12px }
  @media (max-width: 768px) { .grid { grid-template-columns: 1fr } .app-grid { grid-template-columns: 1fr } }
</style>
</head>
<body>

<div class="header" style="position:relative">
  <a href="dashboard.html" style="position:absolute;right:0;top:6px;font-size:13px;color:var(--primary);font-weight:600;text-decoration:none">&#128202; Dashboard</a>
  <h1><span>GHZ</span> Plugin - HTML de Venda</h1>
  <p>Gere chaves de licenca e mensagens para enviar ao cliente.</p>
</div>

<div class="grid">
  <div>
    <div class="card">
      <div class="card-header">Selecionar App</div>
      <div class="card-body">
        <label>Senha Administrativa</label>
        <input type="password" id="adminPassword" placeholder="Senha admin para gerar chaves">
        <div style="display:flex;align-items:center;gap:6px;margin-top:-8px;margin-bottom:13px">
          <input type="checkbox" id="salvarSenha" style="width:auto;margin:0" onchange="toggleSalvarSenha()">
          <label for="salvarSenha" style="margin:0;font-size:11px;text-transform:none;letter-spacing:0;color:var(--fg2);cursor:pointer">Salvar senha neste navegador</label>
        </div>
        <div class="app-grid" id="appGrid"></div>
        <label>Nome do Cliente (opcional)</label>
        <input type="text" id="nomeCliente" placeholder="Ex: Joao Silva">
        <label>Numero do Pedido ML (opcional)</label>
        <input type="text" id="pedidoML" placeholder="Ex: 2000004567890123">
        <button class="btn btn-primary" id="btnGerar" onclick="gerarTudo()">Gerar Chave e Mensagens</button>
      </div>
    </div>
  </div>

  <div>
    <div class="card" id="resultCard" style="display:none">
      <div class="card-header">Chave Gerada</div>
      <div class="card-body">
        <div class="chave-box">
          <div class="chave-valor" id="chaveGerada">-</div>
          <div class="chave-label" id="chaveLabel">selecione um app</div>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:16px">
          <button class="btn-copy" style="flex:1" onclick="copiarTexto(document.getElementById('chaveGerada').textContent,'Chave copiada!')">Copiar Chave</button>
          <button class="btn-copy" style="flex:1" onclick="salvarHistorico()">Salvar no Historico</button>
        </div>
        <div class="tab-row">
          <button class="tab ativo" onclick="trocarTab('ml',this)">Mercado Livre</button>
          <button class="tab" onclick="trocarTab('wpp',this)">WhatsApp</button>
        </div>
        <div id="tabMl">
          <div class="msg-box">
            <div class="msg-header">
              <span class="msg-titulo" id="mlTitulo">Mensagem Mercado Livre</span>
              <button class="btn-copy" onclick="copiarTexto(document.getElementById('msgML').textContent,'Mensagem ML copiada!')">Copiar</button>
            </div>
            <div class="msg-texto" id="msgML">-</div>
          </div>
        </div>
        <div id="tabWpp" style="display:none">
          <div class="msg-box">
            <div class="msg-header">
              <span class="msg-titulo">Mensagem WhatsApp</span>
              <button class="btn-copy" onclick="copiarTexto(document.getElementById('msgWPP').textContent,'Mensagem WhatsApp copiada!')">Copiar</button>
            </div>
            <div class="msg-texto" id="msgWPP">-</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <div class="card-header">
        <span>Historico de Chaves</span>
        <button onclick="limparHistorico()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:11px;font-weight:700">Limpar</button>
      </div>
      <div class="card-body" style="padding:12px">
        <div id="historicoBox"><div class="empty">Nenhuma chave gerada ainda</div></div>
      </div>
    </div>
  </div>
</div>

<div id="toast" style="display:none;position:fixed;bottom:20px;right:20px;background:#22d3a0;color:#000;padding:10px 18px;border-radius:9px;font-weight:700;font-size:13px;z-index:999">Copiado!</div>

<script>
const SUPABASE_URL = 'https://wpkaaxarresldcstaatj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_G3I0XMI3dPG1Skkw9iFm9Q_1Ng6MVG0';

const APPS = [
  { id:'mesaup',     nome:'MesaUp',     desc:'Bar / Lanchonete',      prefix:'MESAUP',  online:true,  repo:'GhuzzBeatz/mesaup',     setup:'MesaUp.Setup.exe' },
  { id:'nexhotel',   nome:'NexHotel',   desc:'Hotelaria',             prefix:'NEXHTL',  online:true,  repo:'GhuzzBeatz/NexHotel',   setup:'NexHotel.Setup.exe' },
  { id:'petflow',    nome:'PetFlow',    desc:'Pet Shop / Vet',        prefix:'PETFLW',  online:true,  repo:'GhuzzBeatz/petflow',    setup:'PetFlow.Setup.exe' },
  { id:'studioflow', nome:'StudioFlow', desc:'Salao / Barbearia',     prefix:'STFLOW',  online:true,  repo:'GhuzzBeatz/studioflow', setup:'StudioFlow.Setup.exe' },
  { id:'imobcore',   nome:'ImobCore',   desc:'Sistema Imobiliario',   prefix:'IMOBC',   online:true,  repo:'GhuzzBeatz/ImobCore',   setup:'ImobCore.Setup.exe' },
  { id:'medcore',    nome:'MedCore',    desc:'Clinica Medica',        prefix:'MEDCOR',  online:true,  repo:'GhuzzBeatz/MEDCORE',    setup:'MedCore.Setup.exe' },
  { id:'folhapro',   nome:'FolhaPro',   desc:'RH e Folha',           prefix:'FOLHA',   online:true,  repo:'GhuzzBeatz/GhuzzBeatz-FOLHAPRO', setup:'FolhaPro.Setup.exe' },
  { id:'zapdisparo', nome:'ZapDisparo', desc:'Disparador WhatsApp',   prefix:'ZAPDISP', online:false, repo:'GhuzzBeatz/ZAPDISPARO', setup:'ZapDisparo.Setup.exe', salt:'GHZ2026ZAPDISPARO', mult:31 },
  { id:'zapbot',     nome:'ZapBot',    desc:'Bot de Atendimento',     prefix:'ZAPBOT',  online:false, repo:'GhuzzBeatz/ZAPBOT',     setup:'ZapBot.Setup.exe', salt:'GHZ2026ZAPBOT', mult:23 },
  { id:'cleanboost', nome:'CleanBoost', desc:'Limpeza de PC',         prefix:'CLEAN',   online:false, repo:'GhuzzBeatz/cleanboost', setup:'CleanBoost.Setup.exe', salt:'GHZ2026CLEANBOOST', mult:41 },
  { id:'pontopro',   nome:'PontoPro',  desc:'Controle de Ponto',      prefix:'PONTO',   online:false, repo:'GhuzzBeatz/pontopro',   setup:'PontoPro.Setup.exe', salt:'GHZ2026PONTOPRO', mult:37 },
  { id:'irpro',      nome:'IRPro',     desc:'Organizador de IR',      prefix:'IRPRO',   online:false, repo:'GhuzzBeatz/irpro',      setup:'IRPro.Setup.exe', salt:'GHZ2026IRPRO', mult:43 },
  { id:'recoverx',   nome:'RecoverX',  desc:'Recuperacao de Dados',   prefix:'RECVX',   online:false, repo:'GhuzzBeatz/recoverx',   setup:'RecoverX.Setup.exe', salt:'GHZ2026RECOVERX', mult:53 },
  { id:'cpfcheck',   nome:'CPFCheck',  desc:'Verificador de CPF',     prefix:'CPFCK',   online:false, repo:'GhuzzBeatz/CPFCheck',   setup:'CPFCheck.Setup.exe', salt:'GHZ2026CPFCHECK', mult:41 }
];

let appAtivo = null;

function downloadUrl(app) {
  return `https://github.com/${app.repo}/releases/latest/download/${app.setup}`;
}

function renderApps() {
  document.getElementById('appGrid').innerHTML = APPS.map(a => `
    <button class="app-btn ${appAtivo && appAtivo.id === a.id ? 'ativo' : ''}" onclick="selecionarApp('${a.id}')">
      <div class="nome">${a.nome} <span class="badge ${a.online ? 'badge-online' : 'badge-local'}">${a.online ? 'Supabase' : 'Local'}</span></div>
      <div class="prefix">${a.prefix}-XXXX-XXXX-XXXX-XXXX</div>
    </button>`).join('');
}

function selecionarApp(id) {
  appAtivo = APPS.find(a => a.id === id);
  renderApps();
}

function gerarChaveLocal(app, n) {
  const p1 = String(n).padStart(4, '0');
  const p2 = btoa(n + app.salt).replace(/[^A-Z0-9]/gi, '').slice(0, 4).toUpperCase();
  const p3 = String((n * app.mult) % 9999).padStart(4, '0');
  return `${app.prefix}-${p1}-${p2}-${p3}`;
}

function toggleSalvarSenha() {
  const cb = document.getElementById('salvarSenha');
  if (cb.checked) {
    const pw = document.getElementById('adminPassword').value;
    if (pw) localStorage.setItem('@GHZ:admin_token', pw);
  } else {
    localStorage.removeItem('@GHZ:admin_token');
  }
}

(function initSenha() {
  const saved = localStorage.getItem('@GHZ:admin_token');
  if (saved) {
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('adminPassword').value = saved;
      document.getElementById('salvarSenha').checked = true;
    });
    // Also try immediately in case DOM is ready
    const el = document.getElementById('adminPassword');
    if (el) { el.value = saved; document.getElementById('salvarSenha').checked = true; }
  }
})();

async function gerarChaveSupabase(appId, cliente, pedidoML) {
  const adminToken = document.getElementById('adminPassword').value.trim();
  if (!adminToken) throw new Error('Digite a senha administrativa.');
  if (document.getElementById('salvarSenha').checked) {
    localStorage.setItem('@GHZ:admin_token', adminToken);
  }
  const body = { p_app_id: appId, p_customer_name: cliente || null, p_admin_token: adminToken };
  if (pedidoML) body.p_ml_order_id = pedidoML;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/ghz_admin_create_license`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('Erro Supabase: ' + res.status);
  const data = await res.json();
  if (!data?.ok) throw new Error(data?.message || 'Erro ao criar licença');
  return data.license_key;
}

async function gerarTudo() {
  if (!appAtivo) { alert('Selecione um app primeiro!'); return; }
  const btn = document.getElementById('btnGerar');
  const cliente = document.getElementById('nomeCliente').value.trim();
  const pedidoML = document.getElementById('pedidoML').value.trim();
  const saudacao = cliente ? `Ola, ${cliente.split(' ')[0]}! ` : 'Ola! ';
  const link = downloadUrl(appAtivo);
  let chave;

  btn.disabled = true; btn.textContent = 'Gerando...';

  try {
    if (appAtivo.online) {
      chave = await gerarChaveSupabase(appAtivo.id, cliente, pedidoML);
    } else {
      const n = Math.floor(Math.random() * 9000) + 1000;
      chave = gerarChaveLocal(appAtivo, n);
    }
  } catch (e) {
    alert('Erro ao gerar chave: ' + e.message);
    btn.disabled = false; btn.textContent = 'Gerar Chave e Mensagens';
    return;
  }

  btn.disabled = false; btn.textContent = 'Gerar Chave e Mensagens';

  document.getElementById('chaveGerada').textContent = chave;
  document.getElementById('chaveLabel').textContent = `${appAtivo.nome}${cliente ? ' - ' + cliente : ''}`;
  document.getElementById('resultCard').style.display = 'block';

  const msgML = `${saudacao}Segue sua chave do ${appAtivo.nome}:\n\nChave: ${chave}\n\nDownload: ${link}\n\nInstale e ative com a chave acima. Qualquer duvida, e so chamar!`;
  document.getElementById('msgML').textContent = msgML;
  const charCount = msgML.replace(/\n/g,' ').length;
  document.getElementById('mlTitulo').textContent = `Mensagem ML (${charCount}/350)`;
  document.getElementById('mlTitulo').style.color = charCount > 350 ? 'var(--red)' : '';

  const msgWPP = `${saudacao}Obrigado pela compra do *${appAtivo.nome}*!\n\nSua chave de ativacao:\n${chave}\n\nComo ativar:\n1. Baixe: ${link}\n2. Instale normalmente\n3. Abra e insira a chave\n\nPronto! Qualquer duvida estou a disposicao.\n- GHZ Plugin`;
  document.getElementById('msgWPP').textContent = msgWPP;
}

function trocarTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
  btn.classList.add('ativo');
  document.getElementById('tabMl').style.display = tab === 'ml' ? 'block' : 'none';
  document.getElementById('tabWpp').style.display = tab === 'wpp' ? 'block' : 'none';
}

function copiarTexto(texto, msg) {
  navigator.clipboard.writeText(texto).then(() => {
    const t = document.getElementById('toast');
    t.textContent = msg || 'Copiado!';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 1800);
  });
}

function salvarHistorico() {
  if (!appAtivo) return;
  const chave = document.getElementById('chaveGerada').textContent;
  if (chave === '-' || !chave) return;
  const cliente = document.getElementById('nomeCliente').value.trim();
  const hist = JSON.parse(localStorage.getItem('ghz_historico') || '[]');
  hist.unshift({ id: Date.now(), appId: appAtivo.id, appNome: appAtivo.nome, chave, cliente, data: new Date().toLocaleDateString('pt-BR') + ' ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) });
  if (hist.length > 200) hist.pop();
  localStorage.setItem('ghz_historico', JSON.stringify(hist));
  renderHistorico();
  copiarTexto(chave, 'Salvo no historico!');
}

function renderHistorico() {
  const hist = JSON.parse(localStorage.getItem('ghz_historico') || '[]');
  const box = document.getElementById('historicoBox');
  if (!hist.length) { box.innerHTML = '<div class="empty">Nenhuma chave gerada ainda</div>'; return; }
  box.innerHTML = hist.slice(0, 50).map(h => `
    <div class="historico-item">
      <div class="info">
        <div class="app-nome">${h.appNome}${h.cliente ? ' - ' + h.cliente : ''}</div>
        <div class="chave-mini">${h.chave}</div>
        <div class="data">${h.data}</div>
      </div>
      <div class="acoes">
        <button class="btn-copy" onclick="copiarTexto('${h.chave}','Chave copiada!')">Copiar</button>
      </div>
    </div>`).join('');
}

function limparHistorico() {
  if (!confirm('Limpar todo o historico?')) return;
  localStorage.removeItem('ghz_historico');
  renderHistorico();
}

renderApps();
renderHistorico();
selecionarApp('mesaup');
</script>
</body>
</html>
